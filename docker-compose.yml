services:
  postgres:
    image: postgres:16-alpine
    container_name: ags_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ags_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ags_password_2026}
      POSTGRES_DB: ${POSTGRES_DB:-ags_eletronica}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ags_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ags_user} -d ${POSTGRES_DB:-ags_eletronica}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ags_backend
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-ags_user}:${POSTGRES_PASSWORD:-ags_password_2026}@postgres:5432/${POSTGRES_DB:-ags_eletronica}?schema=public
      JWT_SECRET: ${JWT_SECRET:-ags_jwt_secret_key_2026_super_secure}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-ags_jwt_refresh_secret_key_2026}
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
    ports:
      - "3001:3001"
    volumes:
      - ./backend/src:/app/src
      - ./backend/uploads:/app/uploads
      - backend_node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ags_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ags_frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:3001/api
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    networks:
      - ags_network

  nginx:
    image: nginx:alpine
    container_name: ags_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - frontend
      - backend
    networks:
      - ags_network

volumes:
  postgres_data:
  backend_node_modules:
  frontend_node_modules:

networks:
  ags_network:
    driver: bridge